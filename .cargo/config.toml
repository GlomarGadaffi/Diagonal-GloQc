[alias]
# Build mvp-daemon for the real firmware target. Needs an
# arm-linux-musleabihf cross-compiler in PATH, e.g. a toolchain from
# https://musl.cc, or the armv7-unknown-linux-musleabihf rustup target
# with rust-lld (see the [target.armv7-unknown-linux-musleabihf] section
# below — no external C cross-compiler needed for this target).
build-mvp-daemon-firmware = "build -p mvp-daemon --bin mvp-daemon --target armv7-unknown-linux-musleabihf --profile firmware"
# Same, but the faster-building/less size-optimized profile for iteration.
build-mvp-daemon-firmware-devel = "build -p mvp-daemon --bin mvp-daemon --target armv7-unknown-linux-musleabihf --profile firmware-devel"
# rootshell, same target.
build-rootshell-firmware = "build -p rootshell --bin rootshell --target armv7-unknown-linux-musleabihf --profile firmware"

[target.aarch64-apple-darwin]
linker = "rust-lld"
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-unknown-linux-musl]
linker = "rust-lld"
rustflags = ["-C", "target-feature=+crt-static"]

# apt install build-essential libc6-armhf-cross libc6-dev-armhf-cross gcc-arm-linux-gnueabihf
[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"
rustflags = ["-C", "target-feature=+crt-static"]

[target.armv7-unknown-linux-musleabihf]
linker = "rust-lld"
rustflags = ["-C", "target-feature=+crt-static"]

[target.armv7-unknown-linux-musleabi]
linker = "rust-lld"
rustflags = ["-C", "target-feature=+crt-static"]

# Disable rust-lld for x86 macOS because the linker crashers when compiling
# the installer in release mode with debug info on.
# [target.x86_64-apple-darwin]
# linker = "rust-lld"
# rustflags = ["-C", "target-feature=+crt-static"]

[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
rustflags = ["-C", "target-feature=+crt-static"]

[profile.release]
# keep line numbers in stack traces for non-firmware binaries
debug = "limited"
lto = "fat"
opt-level = "z"
strip = "debuginfo"

[profile.firmware-devel]
inherits = "release"
opt-level = "s"
lto = false

# optimizations to reduce the binary size of firmware binaries
[profile.firmware]
inherits = "release"
strip = true
codegen-units = 1
panic = "abort"
debug = false
